# Netlify configuration for the Kudbee Quant marketing site.
# Static site — no build step required.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Images/fonts rarely change — cache hard.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS are NOT content-hashed (style.css, main.js), so they must revalidate —
# otherwise an edit stays invisible behind a year-long immutable cache until a
# manual purge (the 2026-06-28 white-screen incident).
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Pretty 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# --- Backend API proxy (Live Signals) -------------------------------------
# NOTE: the site is deployed on **Cloudflare Pages**, which does NOT read this
# file — the live /api proxy is the Pages Function functions/api/[[path]].js.
# This block is kept only as a fallback for a Netlify deploy. It rewrites the
# same-origin /api/* (keeps CSP connect-src 'self') to the FastAPI engine on
# Fly.io (fly.toml + Dockerfile; runbook docs/HOSTING.md). Update the host if
# your Fly app name differs.
[[redirects]]
  from = "/api/*"
  to = "https://kudbee-quant-api.fly.dev/api/:splat"
  status = 200
  force = true
