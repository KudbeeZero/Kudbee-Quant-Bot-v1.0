    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD45E"/><stop offset="1" stop-color="#F5A623"/></linearGradient>
    <radialGradient id="glow" cx="18%" cy="8%" r="60%"><stop offset="0" stop-color="#F5A623" stop-opacity="0.32"/><stop offset="1" stop-color="#F5A623" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2" cx="92%" cy="94%" r="55%"><stop offset="0" stop-color="#2DD4BF" stop-opacity="0.26"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
