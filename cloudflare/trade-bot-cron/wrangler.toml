name = "kudbee-trade-bot-cron"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Fires 2 minutes BEFORE each of the 4 GitHub cron attempts (:05/:20/:35/:50).
# Cloudflare Cron Triggers are reliable — this guarantees the workflow_dispatch
# lands even when GitHub's own scheduler silently drops/delays the run.
# 4 triggers/hour x 24h = 96 Worker invocations/day — well within free tier.
[triggers]
crons = [
  "3 * * * *",
  "18 * * * *",
  "33 * * * *",
  "48 * * * *",
]

[vars]
GH_OWNER = "KudbeeZero"
GH_REPO = "Kudbee-Quant-Bot-v1.0"
# Comma-separated list dispatched every tick. paper-trade.yml is the validated scan;
# paper-status.yml is the read-only open-position reminder (silent when flat) — listing
# it here gives that reminder the same reliable Cloudflare backstop, not just GitHub's
# best-effort */5 cron. (Back-compat: the Worker also accepts the old WORKFLOW_FILE.)
WORKFLOW_FILES = "paper-trade.yml,paper-status.yml"
GH_REF = "main"

# Optional: set TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID as Worker SECRETS (not vars) to get
# a Telegram alert when a dispatch fails (e.g. the GH_TOKEN expired → 401). Unset = silent.
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
