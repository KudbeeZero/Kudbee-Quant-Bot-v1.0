# Render blueprint — the FastAPI app (dashboard + /api, incl. the TradingView
# alert webhook). One always-on Starter instance: free-tier spin-down (15 min
# idle, 30-60s cold start) would drop TV webhook POSTs, so Starter is the
# floor for this service. Auto-deploy on push is Render's default and is load-
# bearing here: every hourly journal commit redeploys the app, which is how
# the dashboard's journal data stays fresh (the checkout IS the data store).
# Runbook: docs/HOSTING.md
services:
  - type: web
    name: kudbee-quant-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn kudbee_quant.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Shared secret for write endpoints (/api/alert, /api/paper/scan).
      # Set in the Render dashboard — never committed.
      - key: KUDBEE_API_TOKEN
        sync: false
      # Shared password that unlocks the admin/investor dashboard + curated
      # runner (kudbee_quant/api_auth.py). Unset => login disabled (fail-closed,
      # dashboard returns 503/redirect). Set in the Render dashboard.
      - key: KUDBEE_DASHBOARD_PASSWORD
        sync: false
      # HMAC key signing the dashboard session cookie. Use a long random value;
      # rotating it logs everyone out. If unset it is derived from the password
      # (so one var still works), but a dedicated secret is recommended.
      - key: KUDBEE_SESSION_SECRET
        sync: false
      # CORS allowlist for the Netlify site origin, e.g. https://example.com
      - key: KUDBEE_SITE_ORIGIN
        sync: false
      # Fine-grained GitHub PAT, THIS repo only, Contents read/write — lets
      # /api/alert commit alerts to data/alert_inbox/ so the hourly Action can
      # score them (kudbee_quant/alert_inbox.py). Optional: without it, alerts
      # are host-local and lost on redeploy (response carries "inbox": false).
      - key: KUDBEE_GH_TOKEN
        sync: false
      - key: KUDBEE_GH_REPO
        value: KudbeeZero/Kudbee-Quant-Bot-v1.0
      # Two-way Telegram command webhook (/api/telegram). TELEGRAM_BOT_TOKEN +
      # TELEGRAM_CHAT_ID gate + send replies; TELEGRAM_WEBHOOK_SECRET is the
      # shared secret verified on every Telegram POST. All set in the dashboard.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      # TR Level Intelligence — Cloudflare D1 (kudbee_quant/intelligence/).
      # All three set in the Render dashboard. Unset => the layer is a silent
      # no-op (wrapped in try/except; never blocks a scan or a Telegram reply).
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: D1_DATABASE_ID
        sync: false
