name: Forward paper-trade (confluence-R)

# Automated FORWARD paper trading of the validated strategy:
# >=50% confluence, 3R target, 0.25-ATR limit-retrace (maker), both sides,
# across the top-10 crypto majors on 5m/15m/1h/2h/4h (each timeframe gets a
# horizon scaled to its bar size). Runs hourly: logs new setups, resolves
# pending/open trades, commits the journal so a real forward track record
# accumulates with no babysitting. Lower TFs (5m/15m) are cost-sensitive — they
# are here to FORWARD-TEST, not because they are proven.

on:
  schedule:
    - cron: "5 * * * *"        # hourly, 5 min after the hour (let the 1h bar close)
  workflow_dispatch:           # manual run button

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Scan for new setups + resolve open trades
        run: |
          # Crypto book (fee-paying: ~0.045%/side taker, see MEMORY §25).
          # ZECUSDT added: strong PVSRA fit, limit-entry orderbook-fill edge confirmed.
          python -m kudbee_quant.cli paper-scan \
            BTCUSDT ETHUSDT BNBUSDT SOLUSDT XRPUSDT ADAUSDT DOGEUSDT AVAXUSDT LINKUSDT DOTUSDT ZECUSDT \
            --intervals 5m 15m 1h 2h 4h --trend-filter || true
          # TradFi book (0-fee promo venue, MEMORY §26) via Yahoo data — gold,
          # silver, S&P, Nasdaq, Dow, WTI, Brent, nat-gas, EUR/GBP-USD. 1h only:
          # the validated timeframe, Yahoo-supported, and avoids session-gap
          # noise on sub-hourly bars. Tagged "*_tradfi" so it scores separately.
          python -m kudbee_quant.cli paper-scan \
            yahoo:GC=F yahoo:SI=F yahoo:^GSPC yahoo:^NDX yahoo:^DJI \
            yahoo:CL=F yahoo:BZ=F yahoo:NG=F yahoo:EURUSD=X yahoo:GBPUSD=X \
            --intervals 1h --trend-filter || true
          python -m kudbee_quant.cli journal-check || true
          echo "---- scorecard ----"
          python -m kudbee_quant.cli journal-score || true

      - name: Commit journal if changed
        run: |
          git config user.name "kudbee-paper-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/journal.json; then
            git add data/journal.json
            git commit -m "paper-trade: update journal [skip ci]"
            git push
          else
            echo "No journal changes this run."
          fi
