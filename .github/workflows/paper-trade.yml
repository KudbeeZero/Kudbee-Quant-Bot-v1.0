name: Forward paper-trade (confluence-R)

# Automated FORWARD paper trading of the validated strategy:
# >=50% confluence, 3R target, 0.25-ATR limit-retrace (maker), both sides.
# CRYPTO universe = the validated TOP-10 majors (kudbee_quant.universe.TOP_10_CRYPTO)
# on 1h only. Runs hourly: logs new setups, resolves pending/open trades, commits the
# journal so a real forward track record accumulates with no babysitting.
#
# NOTE (§45 diagnosis, 2026-06-19): the §43 top-100 + 5m experiment (2026-06-14) ran
# AGAINST our own evidence and the live paper data confirmed it — the top-100 long
# tail bled (-0.50R/trade, §31) and EVERY crypto timeframe was net-negative (5m -0.63R
# §37, 15m -0.36, 2h -0.38, 4h -0.55), while top-10 majors on 1h sat ~breakeven. The
# cluster analyzer (§45) further found losses concentrate in specific hours (18h: 2%
# win, p<0.001) and on longs. So we REVERTED to the §1 validated config to re-measure
# the real edge cleanly. (A killzone/hour gate — PR #20, currently OFF — is the next
# candidate to cut the toxic-hour clusters; forward-validate before enabling.)

on:
  schedule:
    # FOUR attempts/hour (every 15 min). GitHub's cron is best-effort and silently
    # drops/delays many scheduled runs (observed: ~6 of 18 hourly runs fired, 15-40
    # min late), which is why Telegram alerts only arrived on manual triggers. More
    # independent attempts => higher chance at least one lands each hour. The
    # per-(symbol,timeframe,book) dedup makes a re-scan idempotent for OPENS (no
    # duplicate trades); it just also resolves trades and re-sends the summary sooner.
    # The run heartbeat (record-run below) makes any remaining drops VISIBLE in the
    # summary. For rock-solid timing, deploy the external Cloudflare Worker cron —
    # see cloudflare/trade-bot-cron (the bulletproof fix).
    - cron: "5 * * * *"        # primary, ~5 min after the hour
    - cron: "20 * * * *"       # +15
    - cron: "35 * * * *"       # +30 (original backup)
    - cron: "50 * * * *"       # +45
  workflow_dispatch:           # manual run button

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Ingest TradingView alert inbox
        # Hosted /api/alert commits alerts to data/alert_inbox/ (the host's own
        # journal is ephemeral — see kudbee_quant/alert_inbox.py). Drain them
        # into the journal of record BEFORE the scan so this run resolves them.
        run: python -m kudbee_quant.cli ingest-alerts || true

      - name: Scan for new setups + resolve open trades
        # TELEGRAM_* (optional repo secrets): when set, paper-scan pings new
        # setups and journal-check pings resolved trades. Unset -> silent no-op.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Crypto book (fee-paying: ~0.045%/side taker, see MEMORY §25).
          # REVERTED to the validated config 2026-06-19 (§45 diagnosis): the §43
          # top-100 + 5m experiment was net-negative across the board — the top-100
          # long tail bled (-0.50R, §31) and EVERY sub/multi-TF was net-negative
          # (5m -0.63R §37, 15m -0.36, 2h -0.38, 4h -0.55), while top-10 majors on
          # 1h sat ~breakeven. Back to the §1 forward set: TOP_10_CRYPTO, 1h only.
          CRYPTO_UNIVERSE="$(python -c 'from kudbee_quant.universe import TOP_10_CRYPTO; print(" ".join(TOP_10_CRYPTO))')"
          python -m kudbee_quant.cli paper-scan \
            $CRYPTO_UNIVERSE \
            --intervals 1h --tp1-r 1.0 --tp1-frac 0.0 --trend-filter || true
          # TradFi book CUT 2026-06-22 (owner-approved): net-negative forward —
          # scorecard verdict REVERT (~-0.29R net over n=46; it led a -4R day on
          # 2026-06-22). The Yahoo universe is no longer scanned. Any still-open
          # tradfi positions resolve normally via journal-check below.
          python -m kudbee_quant.cli journal-check || true
          echo "---- scorecard ----"
          python -m kudbee_quant.cli journal-score || true

      # Experiment §A (5m long-only crypto book) CUT 2026-06-22 (owner-approved):
      # net-negative forward — scorecard verdict REVERT (~-0.25R net), and 5m has lost
      # money on every prior look (§37 -0.63R, etc.). No 5m scan runs anymore; any
      # still-open "_lo" positions resolve via the journal-check above. The flags
      # (--long-only / --trailing-atr) remain in the CLI if we ever re-test it offline.

      - name: "§C — clean trend stack (1h, experiment, +0.1152R CLAIM unverified)"
        # §C (2026-06-22): overnight-harness top candidate (claimed n=804, delta
        # +0.1152R — NOT verified in this repo) — gate to clean 13/50/800-EMA stacks
        # with a WIDENING 13/50 gap (a separating trend, skips braided ones). Runs on
        # the SAME top-10/1h as the baseline, but per-book dedup (setup "_cts") lets it
        # hold its own trade alongside the validated book; the net-exposure guard still
        # caps combined per-coin risk. Separately scored (setup contains "_cts"), shown
        # as [trend] in Telegram. Pay-yourself breakeven, like the baseline 1h book.
        # UNVERIFIED paper experiment — watch its forward _cts record; revert if negative.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CRYPTO_UNIVERSE="$(python -c 'from kudbee_quant.universe import TOP_10_CRYPTO; print(" ".join(TOP_10_CRYPTO))')"
          python -m kudbee_quant.cli paper-scan \
            $CRYPTO_UNIVERSE \
            --intervals 1h \
            --tp1-r 1.0 --tp1-frac 0.0 \
            --trend-filter --clean-trend-stack || true
          python -m kudbee_quant.cli journal-check || true

      - name: Stamp run heartbeat
        # Records this run in data/heartbeat.json BEFORE the summary, so the
        # summary's scheduler-health line reflects how many of the last 24h
        # actually had a run (vs. were silently dropped by GitHub's cron). The
        # heartbeat is committed below alongside the journal.
        run: python -m kudbee_quant.cli record-run || true

      - name: Telegram hourly summary
        # No-op unless the TELEGRAM_* repo secrets are set; trade-open and
        # resolved pings fire from the scan/journal-check steps above (also
        # silently no-op without secrets). Now also carries a scheduler-health
        # line (last-run gap + 24h coverage) from the heartbeat. See docs/NOTIFICATIONS.md.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m kudbee_quant.cli notify-summary || true

      - name: Session crossover alerts
        # Asia (20:00 ET) / London (02:00 ET) / NY-Brinks (08:00 ET) context ping:
        # weekly bias + nearby M/W-open, pivot, ADR and Asian-range levels. Stateless —
        # fires once when this hourly run lands in a session-open hour. Deliberately
        # NOT added to the :35 status job (paper-status.yml), to avoid a double-ping.
        # No-op without TELEGRAM_* secrets. See docs/NOTIFICATIONS.md.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m kudbee_quant.cli notify-session || true

      - name: Commit journal if changed
        run: |
          git config user.name "kudbee-paper-bot"
          git config user.email "actions@users.noreply.github.com"
          # -A so consumed inbox files (deletions/renames) are staged too.
          # data/heartbeat.json is bot-written each run (scheduler-gap visibility).
          git add -A data/journal.json data/alert_inbox data/heartbeat.json
          if ! git diff --cached --quiet; then
            git commit -m "paper-trade: update journal [skip ci]"
            # An alert can land in the inbox mid-run — rebase so the push
            # doesn't bounce (inbox files are create-only; never conflicts).
            git pull --rebase origin main
            git push
          else
            echo "No journal changes this run."
          fi

      - name: Telegram failure alert
        # Fires only if an earlier step hard-failed (the scan steps use `|| true`,
        # so this catches infra failures: checkout, deps, commit/push). Soft
        # logic-health shows up in the hourly summary's warnings instead.
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY' || true
          from kudbee_quant.notifications import notify_error
          notify_error("hourly paper-trade run FAILED",
                       "A step errored in GitHub Actions — check the run logs.")
          PY
