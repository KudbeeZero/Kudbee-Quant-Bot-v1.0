name: Deploy API to Fly.io

# Deploys the FastAPI engine (Dockerfile + fly.toml) to Fly.io. Replaces the
# retired Render auto-deploy. Runbook: docs/HOSTING.md.
#
# FRESHNESS: the dashboard/Lab journal is baked into the image, so it is only as
# fresh as the last deploy. This runs hourly (:55, just before the paper bot's
# :05 scan resolves the next batch) to keep it current — Fly does a rolling,
# near-zero-downtime deploy, so the always-on TradingView webhook is preserved.
# The compute endpoints (/api/signal, /api/trace, /api/sandbox/trace) fetch live
# market data and are always fresh regardless of deploy cadence.
#
# INERT UNTIL CONFIGURED: every real step is gated on the FLY_API_TOKEN secret.
# Until you run `fly tokens create deploy` and add it as a repo secret, this
# workflow is a green no-op — nothing deploys, nothing errors. Set the secret to
# turn it on. To change cadence, edit the cron below (or delete it and deploy
# manually with the "Run workflow" button / `fly deploy`).

on:
  push:
    branches: [main]
    # Only redeploy when something that changes the running app changed.
    paths:
      - "kudbee_quant/**"
      - "config/**"
      - "requirements.txt"
      - "Dockerfile"
      - "fly.toml"
  schedule:
    - cron: "55 * * * *"   # hourly journal freshness
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Check the deploy token is configured
        id: check
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy (this is a no-op, not a failure)."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.check.outputs.present == 'true'
        uses: actions/checkout@v4
      - name: Set up flyctl
        if: steps.check.outputs.present == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        if: steps.check.outputs.present == 'true'
        run: flyctl deploy --remote-only
