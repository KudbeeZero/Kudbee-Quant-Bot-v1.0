name: CI (tests + lint)

# Runs the test suite (blocking) and ruff (informational for now) on every push
# and PR, so regressions and style drift surface immediately.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -q -r requirements.txt
          pip install -q ruff
      - name: Ruff (non-blocking for now)
        continue-on-error: true
        run: ruff check kudbee_quant scripts
      - name: Tests
        run: python -m pytest tests/ -q
