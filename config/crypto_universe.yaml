# Top-100 crypto trading universe (1h timeframe).
#
# STATIC FALLBACK list — this is a committed snapshot, NOT a live top-100 feed.
# Rankings drift; treat the membership as UNPROVEN until a forward record exists
# per symbol (the strategy is only walk-forward validated on the top-10 majors,
# MEMORY §1/§31 — the long tail here is forward-test, not proven edge).
#
# Loader: kudbee_quant/universe_loader.py (load_universe). Each entry becomes a
# Binance spot pair `<symbol><quote>` (e.g. BTC -> BTCUSDT) unless `pair` is set.
# `enabled: false` entries are SKIPPED by the scanner. The timeframe is locked to
# 1h for this foundation (no 5m — MEMORY §37 paused the fee-poisoned 5m book).
#
# Fields per entry (only `symbol` is required; the rest fall back to the defaults):
#   symbol            ticker, e.g. BTC
#   enabled           true/false (default true) — disabled symbols are never traded
#   pair              explicit exchange pair (default: <symbol><quote>)
#   timeframe         default: default_timeframe (MUST be 1h here)
#   max_position_usd  per-symbol position cap in USD (default: default_max_position_usd)
#   risk_label        free label: major | large | mid | small (informational)
#   notes             free text

quote: USDT
default_timeframe: "1h"
default_max_position_usd: 100

