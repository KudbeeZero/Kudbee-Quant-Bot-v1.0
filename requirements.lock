# requirements.lock — full transitive pin of requirements.txt, resolved in a clean
# python:3.11 venv (matches the Dockerfile base). The Fly image installs from THIS
# file so the hourly journal-freshness rebuild (fly-deploy.yml cron) cannot pull
# unreviewed dependency drift. Regenerate deliberately after editing
# requirements.txt:  python3.11 -m venv /tmp/lk && /tmp/lk/bin/pip install -r
# requirements.txt && /tmp/lk/bin/pip freeze > requirements.lock  (then re-add
# this header). CI still installs requirements.txt (ranges) so test runs keep
# catching upstream breakage early; the deployed image is what's pinned.
