<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sign in — Kudbee Quant</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full bg-ink font-mono text-body antialiased">
  <main class="min-h-full flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
      <div class="flex items-center gap-3 mb-8 justify-center">
        <div class="h-11 w-11 grid place-items-center text-honey font-bold text-lg border-2 border-honey"
             style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">K</div>
        <div class="leading-tight">
          <div class="text-honey font-bold tracking-[0.2em] text-lg">KUDBEE QUANT</div>
          <div class="text-muted text-[11px] tracking-widest">CONTROL CENTER</div>
        </div>
      </div>

      <div class="kq-card">
        <h1 class="kq-card-title">Restricted — sign in</h1>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="kq-label" for="password">Access password</label>
            <input class="kq-input" id="password" name="password" type="password"
                   autocomplete="current-password" required autofocus />
          </div>
          <button class="kq-btn w-full justify-center py-2" type="submit" id="submit">
            Sign in
          </button>
          <p id="msg" class="text-danger text-xs min-h-[1rem]" role="alert"></p>
        </form>
      </div>

      <p class="text-muted text-[11px] text-center mt-6 leading-relaxed">
        Admin / investor access. Data shown is a directional research read, not advice.
      </p>
    </div>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
