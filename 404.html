<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e17" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="noindex" />
  <title>Lost in the hive — Kudbee Quant</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --honey:#F5A623; --honey-lt:#FFD45E; --honey-glow:rgba(245,166,35,.45); --ease:cubic-bezier(.22,1,.36,1); }
    * { margin:0; box-sizing:border-box; }
    body { min-height:100vh; display:grid; place-items:center; text-align:center; padding:24px;
      background-color:#0a0e17;
      background-image:radial-gradient(700px 420px at 50% -10%, rgba(245,166,35,.08), transparent 65%),
        radial-gradient(600px 380px at 85% 100%, rgba(45,212,191,.05), transparent 65%);
      color:#EAF0FA; font-family:'Inter',system-ui,sans-serif; }
    .code { font-family:'Space Grotesk',sans-serif; font-size:clamp(5rem,18vw,11rem); font-weight:700;
      background:linear-gradient(120deg,var(--honey-lt),var(--honey)); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:clamp(1.4rem,4vw,2rem); margin:8px 0 12px; letter-spacing:-0.02em; }
    p { color:#9AA6BC; max-width:420px; margin:0 auto 28px; line-height:1.6; }
    .actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    a { display:inline-block; font-family:'Space Grotesk',sans-serif; font-weight:600; padding:14px 26px;
      border-radius:999px; text-decoration:none; transition:transform .25s var(--ease), box-shadow .25s var(--ease); }
    a:hover { transform:translateY(-2px); }
    a:focus-visible { outline:2px solid var(--honey-lt); outline-offset:3px; }
    .btn-primary { background:linear-gradient(135deg,var(--honey-lt),var(--honey)); color:#16120a;
      box-shadow:0 8px 30px -8px var(--honey-glow); }
    .btn-primary:hover { box-shadow:0 14px 40px -8px var(--honey-glow); }
    .btn-ghost { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); color:#EAF0FA; }
    .btn-ghost:hover { background:rgba(255,255,255,.06); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page flew the hive.</h1>
    <p>The signal you’re looking for doesn’t exist — but plenty of others do.</p>
    <div class="actions">
      <a class="btn-primary" href="/">Back to home</a>
      <a class="btn-ghost" href="/blog/">Browse the blog</a>
    </div>
  </div>
</body>
</html>
