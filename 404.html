<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="noindex" />
  <title>Lost in the hive — Kudbee Quant</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --honey:#F5A623; --honey-lt:#FFD45E; }
    * { margin:0; box-sizing:border-box; }
    body { min-height:100vh; display:grid; place-items:center; text-align:center; padding:24px;
      background:#0a0e17; color:#EAF0FA; font-family:'Inter',system-ui,sans-serif; }
    .code { font-family:'Space Grotesk',sans-serif; font-size:clamp(5rem,18vw,11rem); font-weight:700;
      background:linear-gradient(120deg,var(--honey-lt),var(--honey)); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:clamp(1.4rem,4vw,2rem); margin:8px 0 12px; }
    p { color:#9AA6BC; max-width:420px; margin:0 auto 28px; }
    a { display:inline-block; background:linear-gradient(135deg,var(--honey-lt),var(--honey)); color:#16120a;
      font-family:'Space Grotesk',sans-serif; font-weight:600; padding:14px 26px; border-radius:999px; text-decoration:none; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page flew the hive.</h1>
    <p>The signal you’re looking for doesn’t exist — but plenty of others do.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
