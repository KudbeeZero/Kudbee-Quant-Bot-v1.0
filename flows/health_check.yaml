# Kestra flow — health check / failure alert. PLAN/SCAFFOLD, not stood up.
# Read-only; safe by default. See docs/KESTRA_AUTOMATION.md.
id: health_check
namespace: kudbee.quant
description: |
  Lightweight liveness check: confirm the package imports, the universe config
  loads, and the runtime config resolves to a SAFE (paper) state. Surfaces drift
  (e.g. live accidentally enabled) early. Read-only; safe to rerun.

concurrency:
  limit: 1

tasks:
  - id: assert_safe
    type: io.kestra.plugin.scripts.python.Commands
    env:
      TRADING_MODE: paper
      ENABLE_LIVE_EXECUTION: "false"
    retry:
      type: constant
      interval: PT1M
      maxAttempt: 3
    commands:
      - python -c "from kudbee_quant.universe_loader import load_universe; assert len(load_universe()) > 0"
      - python -c "from kudbee_quant.config.runtime import load_runtime_config; c=load_runtime_config(); assert not c.is_live, 'LIVE ENABLED unexpectedly'; print('health ok:', c.as_dict())"

triggers:
  - id: every_15m
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "*/15 * * * *"

errors:
  - id: on_failure
    type: io.kestra.plugin.core.log.Log
    message: "health_check FAILED — package/universe/runtime problem OR live mode drift."
